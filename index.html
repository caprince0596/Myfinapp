
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyFin | Personal Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Urbanist', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            50: '#f0f9ff', // sky-50
                            100: '#e0f2fe', // sky-100
                            200: '#bae6fd', // sky-200
                            300: '#7dd3fc', // sky-300
                            400: '#38bdf8', // sky-400
                            500: '#0ea5e9', // sky-500
                            600: '#0284c7', // sky-600
                            700: '#0369a1', // sky-700
                            800: '#075985', // sky-800
                            900: '#0c4a6e', // sky-900
                            950: '#082f49', // sky-950
                        },
                        indigo: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9', // Primary Action Color
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                            950: '#082f49',
                        },
                        brand: {
                            purple: '#38bdf8', // Replaced with Sky Blue
                            lavender: '#e0f2fe', // Replaced with Light Sky
                            deep: '#0c4a6e', // Replaced with Deep Sky
                            glass: 'rgba(255, 255, 255, 0.7)',
                            neon: '#7dd3fc'
                        }
                    },
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }
        body {
            font-family: 'Urbanist', sans-serif;
            background: linear-gradient(180deg, #bae6fd 0%, #f0f9ff 40%, #ffffff 100%);
            background-attachment: fixed;
            color: #0c4a6e;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
            position: relative;
        }
        
        /* Removed mesh gradient background to ensure solid white */

        #root { height: 100%; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(14, 165, 233, 0.15);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -4px 20px rgba(14, 165, 233, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.1); border-radius: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
